name: Docs Parse + Render CD

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  docs-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate documentation artifacts
        run: npm run docs:generate

      - name: Generate llm.txt
        run: npm run docs:llm

      - name: Check generated changes (PR)
        if: github.event_name == 'pull_request'
        run: |
          if ! git diff --quiet; then
            echo "Generated files are out of date. Run 'npm run docs:generate' and commit changes."
            git status --short
            exit 1
          fi

      - name: Commit generated docs (master)
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        run: |
          if ! git diff --quiet; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add src/Components src/Styles src/routes.js llm.txt
            git commit -m "chore(docs): auto-generate docs artifacts from markdown"
            git push
          else
            echo "No generated changes to commit."
          fi

      - name: Trigger Render deploy
        if: github.event_name == 'push' && github.ref == 'refs/heads/master' && secrets.RENDER_DEPLOY_HOOK_URL != ''
        run: |
          curl --fail --silent --show-error --request POST "$RENDER_DEPLOY_HOOK_URL"
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
