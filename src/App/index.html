<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Slice.js Web Framework</title>
    <link rel="icon" type="image/svg+xml" href="/images/Slice.js-logo.svg" />
    <link rel="icon" type="image/x-icon" href="/images/favicon.ico" />
    <link rel="stylesheet" type="text/css" href="/App/style.css" />
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "Slice.js Documentation",
        "url": "https://slicejs.com",
        "description": "Comprehensive documentation site for the Slice.js web framework. Includes guides, API references, interactive examples, and visual component documentation.",
        "author": {
          "@type": "Organization",
          "name": "VKneider",
          "url": "https://github.com/VKneider"
        },
        "potentialAction": {
          "@type": "SearchAction",
          "target": {
            "@type": "EntryPoint",
            "urlTemplate": "https://slicejs.com/?q={search_term_string}"
          },
          "query-input": "required name=search_term_string"
        }
      }
    </script>

    <!-- Prism -->

   

    <!-- Eliminar Prism despues-->
  </head>

  <body>
    <div id="app">
      <script src="/App/index.js" type="module"></script>
    </div>
  </body>
</html>
